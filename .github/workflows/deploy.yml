name: Deploy Production

on:
  push:
    branches:
      - feat/production-rollout
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  APP_DIR: /var/www/getotps/backend

jobs:
  quality:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ env.APP_DIR }}"
            git fetch origin
            git checkout feat/production-rollout
            git pull --ff-only origin feat/production-rollout
            npm ci
            npm run build
            npm run db:push
            pm2 reload ecosystem.config.cjs --update-env || pm2 start ecosystem.config.cjs
            pm2 save
            nginx -t
            systemctl reload nginx
            curl -fsS https://getotps.com/healthz >/dev/null
            curl -fsS https://getotps.com/readyz >/dev/null
