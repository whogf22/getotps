services:
  app:
    build: .
    ports:
      - "5000:5000"
    env_file: .env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  worker:
    build: .
    command: ["node", "dist/worker.cjs"]
    env_file: .env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: getotps
      POSTGRES_PASSWORD: getotps
      POSTGRES_DB: getotps
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - certbot-webroot:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-webroot:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    command:
      [
        "certonly",
        "--webroot",
        "-w",
        "/var/www/certbot",
        "-d",
        "getotps.com",
        "--email",
        "admin@getotps.com",
        "--agree-tos",
        "--non-interactive",
      ]

volumes:
  pgdata:
  certbot-webroot:
  letsencrypt:
